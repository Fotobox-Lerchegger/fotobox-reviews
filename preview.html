<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bewertungen Vorschau</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: transparent;
    }

    .wrapper {
      padding: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #eee;
      box-shadow: 0 18px 40px rgba(0,0,0,0.06);
    }

    .image img {
      width: 100%;
      height: auto;
      display: block;
    }

    .content {
      padding: 18px;
    }

    .stars {
      color: #c59d5f;
      margin-bottom: 8px;
    }

    .title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .name {
      font-size: 14px;
      color: #888;
      margin-bottom: 10px;
    }

    .text {
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div id="output">Lade Bewertungen...</div>
  </div>

  <script>
    const SUPABASE_URL = "https://toumkzdlnvipduoutwii.supabase.co";
    const SUPABASE_KEY = "sb_publishable_llXOp1CMCTLLGwUR25yC2g_j2qI2EwH";
    const BUCKET = "reviews-images";

    function stars(n) {
      return "★".repeat(n || 0) + "☆".repeat(5 - (n || 0));
    }

    function resize() {
      const height = document.body.scrollHeight;
      parent.postMessage({ type: "resize", height: height }, "*");
    }

    fetch(
      SUPABASE_URL + "/rest/v1/reviews?status=eq.approved&select=*&order=created_at.desc&limit=3",
      {
        headers: { apikey: SUPABASE_KEY }
      }
    )
    .then(r => r.json())
    .then(data => {

      if (!data.length) {
        document.getElementById("output").innerHTML = "Keine Bewertungen vorhanden";
        resize();
        return;
      }

      let html = '<div class="grid">';

      data.forEach(item => {
        let img = item.image_url
          ? SUPABASE_URL + "/storage/v1/object/public/" + BUCKET + "/" + item.image_url
          : "";

        html += `
          <div class="card">
            ${img ? `<div class="image"><img src="${img}" onload="resize()"></div>` : ""}
            <div class="content">
              <div class="stars">${stars(item.stars)}</div>
              <div class="title">${item.title || ""}</div>
              <div class="name">${item.name || ""}</div>
              <div class="text">${item.review_text || ""}</div>
            </div>
          </div>
        `;
      });

      html += "</div>";

      document.getElementById("output").innerHTML = html;

      // NUR EINMAL + leicht verzögert
      setTimeout(resize, 200);
      setTimeout(resize, 800);

    })
    .catch(() => {
      document.getElementById("output").innerHTML = "Fehler beim Laden";
      resize();
    });
  </script>
</body>
</html>
