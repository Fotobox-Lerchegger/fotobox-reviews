<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: transparent;
  color: #4a3b2c;
}

.wrapper {
  padding: 20px;
}

.inner {
  max-width: 1200px;
  margin: 0 auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 380px));
  justify-content: center;
  gap: 26px;
}

.card {
  background: #ffffff;
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid #eee;
  box-shadow: 0 18px 40px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
}

.image {
  height: 220px;
  overflow: hidden;
  background: #f5f5f5;
  display: none;
}

.image.has-image {
  display: block;
}

.image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.content {
  padding: 18px;
}

.stars {
  color: #c59d5f;
  font-size: 15px;
  margin-bottom: 8px;
  font-weight: 600;
}

.title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
}

.name {
  font-size: 14px;
  color: #888;
  margin-bottom: 10px;
}

.text {
  font-size: 14px;
  line-height: 1.6;
  color: #5b4f42;
}

.state {
  text-align: center;
  padding: 40px;
  font-size: 16px;
}

.bottom-btn {
  text-align: center;
  margin-top: 40px;
}

.bottom-btn a {
  display: inline-block;
  background: #b88f45;
  color: #fff;
  text-decoration: none;
  padding: 14px 28px;
  border-radius: 999px;
  font-weight: 700;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="inner">
    <div id="output" class="state">Lade Bewertungen...</div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://toumkzdlnvipduoutwii.supabase.co";
const SUPABASE_KEY = "sb_publishable_llXOp1CMCTLLGwUR25yC2g_j2qI2EwH";
const BUCKET = "reviews-images";

function stars(n){
  n = Number(n) || 0;
  return "★".repeat(n) + "☆".repeat(5-n);
}

function resize(){
  const h = document.body.scrollHeight;
  parent.postMessage({ type: "resize-all-reviews", height: h }, "*");
}

fetch(SUPABASE_URL + "/rest/v1/reviews?status=eq.approved&select=*&order=created_at.desc", {
  headers: {
    apikey: SUPABASE_KEY,
    Authorization: "Bearer " + SUPABASE_KEY
  }
})
.then(r => r.json())
.then(data => {

  if(!data.length){
    document.getElementById("output").innerHTML = "Keine Bewertungen vorhanden";
    resize();
    return;
  }

  let html = '<div class="grid">';

  data.forEach((item, i) => {

    let img = item.image_url
      ? SUPABASE_URL + "/storage/v1/object/public/" + BUCKET + "/" + item.image_url
      : "";

    html += `
      <div class="card">
        <div class="image ${img ? 'has-image' : ''}" id="img-${i}">
          ${img ? `<img src="${img}" onerror="document.getElementById('img-${i}').style.display='none';">` : ""}
        </div>

        <div class="content">
          <div class="stars">${stars(item.stars)} (${item.stars}/5)</div>
          <div class="title">${item.title || ""}</div>
          <div class="name">${item.name || ""}</div>
          <div class="text">${item.review_text || ""}</div>
        </div>
      </div>
    `;
  });

  html += `</div>

  <div class="bottom-btn">
    <a href="https://www.eventfotobox-lerchegger.at/galerie-bewertungen" target="_top">
      ← Zurück zur Galerie & Bewertungen
    </a>
  </div>
  `;

  document.getElementById("output").innerHTML = html;

  setTimeout(resize, 300);
});
</script>

</body>
</html>
